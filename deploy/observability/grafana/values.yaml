# Grafana for the k3s cluster, values over the grafana/grafana chart. Provisions the
# Tempo datasource so traces are searchable by id. Service stays ClusterIP: exposure
# (ingress, access control) is deferred until the cluster edge is decided, so reach it
# for now with `kubectl -n pulse-system port-forward svc/pulse-grafana 3000:80`.
# Track the latest Grafana. Chart 10.5.15 ships appVersion 12.3.1, so pin the image
# ahead of it to match the dev stack; the chart templates are version-tolerant here.
image:
  tag: "13.1.0"

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 5Gi

# Land on the Pulse overview instead of Grafana's stock welcome page (RFC-010 section 8),
# and default to the Gloom theme. Org name and week start are org preferences: in the
# cluster Grafana is stateful (persistence below) with a real login, so set those in the
# UI once and they persist.
grafana.ini:
  dashboards:
    default_home_dashboard_path: /var/lib/grafana/dashboards/pulse/pulse-overview.json
  users:
    default_theme: gloom

# Load the dashboards-as-code from the pulse-dashboards ConfigMap (install.sh builds it
# from the same JSON the dev stack uses, so the two cannot drift).
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: pulse
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/pulse
dashboardsConfigMaps:
  pulse: pulse-dashboards

# Provisioned as code (RFC-010 section 8): the repo is the source of truth, not the UI.
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://pulse-tempo.pulse-system.svc.cluster.local:3200
        isDefault: true
        jsonData:
          # Service Graph reads the service-graph series Tempo remote-writes to Prometheus.
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://pulse-prometheus-server.pulse-system.svc.cluster.local
        isDefault: false
        jsonData:
          # Jump from a metric exemplar straight to its trace.
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
