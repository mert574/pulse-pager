# Prometheus for the k3s cluster, values over the prometheus-community/prometheus chart.
# It does two jobs (RFC-010 section 2): scrape the platform pods for their /metrics, and
# receive Tempo's service-graph metrics over remote-write so Grafana's Service Graph has
# data. Mirrors the dev compose Prometheus (top-level observability/prometheus).
#
# The chart's default scrape config already discovers pods by the prometheus.io/scrape,
# prometheus.io/port, prometheus.io/path annotations, so the app pods are scraped once
# their Deployments carry those annotations (those manifests come with the wider RFC-011
# migration, not in this dir yet).
server:
  # remote-write receive backs the service graph; exemplar storage backs the
  # metric -> trace exemplar links (RFC-010 section 2.6). web.enable-lifecycle is the
  # chart default, repeated here because extraFlags replaces the default list.
  extraFlags:
    - web.enable-lifecycle
    - web.enable-remote-write-receiver
    - enable-feature=exemplar-storage

  # Keep metrics across pod restarts (k3s local-path StorageClass satisfies this).
  persistentVolume:
    enabled: true
    size: 10Gi

  # Cluster-internal like Grafana and Tempo; exposure is deferred (see README).
  service:
    type: ClusterIP

# Keep the install lean: only the Prometheus server. The node / kube-state metrics and
# Alertmanager come with the SLO dashboards + alerts thread, not this slice.
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: false
kube-state-metrics:
  enabled: false
