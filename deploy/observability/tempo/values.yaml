# Tempo (single binary) for the k3s cluster, values over the grafana/tempo chart.
# Receives OTLP from the collector, stores traces on a PVC (k3s local-path). Prod at
# scale moves to an object-store backend; storage/retention is RFC-010 open question 1.
tempo:
  # The chart's default receivers already include OTLP on 4317/4318, which is the only
  # ingest path we use (the collector forwards here, RFC-010 section 4.3). The chart's
  # service template hard-references the jaeger receiver, so leave the receiver defaults
  # in place rather than pruning them; the extra listeners are unused but harmless.
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Metrics-generator with local-blocks so TraceQL metrics (rate(), quantile_over_time(),
  # the metrics view in Grafana) work. Computed inside Tempo, no Prometheus needed.
  # The chart's default remoteWriteUrl is unused here because we only run the local_blocks
  # processor (span_metrics/service_graphs, which would remote-write to Prometheus, are
  # off until the metrics pillar lands).
  metricsGenerator:
    enabled: true
    processor:
      local_blocks:
        flush_to_storage: true
    storage:
      path: /var/tempo/generator/wal
    traces_storage:
      path: /var/tempo/generator/traces

  # Turn the local-blocks processor on for the default tenant.
  overrides:
    defaults:
      metrics_generator:
        processors: [local-blocks]

# Keep traces across pod restarts. k3s ships the local-path provisioner, so the default
# StorageClass satisfies this with no extra setup.
persistence:
  enabled: true
  size: 10Gi
