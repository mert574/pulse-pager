# Tempo (single binary) for the k3s cluster, values over the grafana/tempo chart.
# Receives OTLP from the collector, stores traces on a PVC (k3s local-path). Prod at
# scale moves to an object-store backend; storage/retention is RFC-010 open question 1.
tempo:
  # The chart's default receivers already include OTLP on 4317/4318, which is the only
  # ingest path we use (the collector forwards here, RFC-010 section 4.3). The chart's
  # service template hard-references the jaeger receiver, so leave the receiver defaults
  # in place rather than pruning them; the extra listeners are unused but harmless.
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Metrics-generator with two processors (RFC-010 section 4): local-blocks so TraceQL
  # metrics (rate(), quantile_over_time(), the metrics view in Grafana) work inside Tempo,
  # and service-graphs so Grafana's Service Graph has data. The service-graph series (and
  # their exemplars) are remote-written to the in-cluster Prometheus; local-blocks stays
  # internal to Tempo.
  metricsGenerator:
    enabled: true
    processor:
      local_blocks:
        flush_to_storage: true
      service_graphs: {}
    storage:
      path: /var/tempo/generator/wal
      remote_write:
        - url: http://pulse-prometheus-server.pulse-system.svc.cluster.local/api/v1/write
          send_exemplars: true
    traces_storage:
      path: /var/tempo/generator/traces
    registry:
      external_labels:
        source: tempo

  # Turn both generator processors on for the default tenant.
  overrides:
    defaults:
      metrics_generator:
        processors: [local-blocks, service-graphs]

# Keep traces across pod restarts. k3s ships the local-path provisioner, so the default
# StorageClass satisfies this with no extra setup.
persistence:
  enabled: true
  size: 10Gi
