# Local dev infrastructure for Pulse. Redpanda stands in for Kafka (same API,
# single container); production uses managed MSK/Confluent per RFC-011. The
# service binaries connect to these via the PULSE_* env vars (see .env.example).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Trace pipeline (RFC-021 / RFC-010), opt-in behind the "obs" profile so a plain
  # `make up` stays light. Bring it up with `make up-obs`, set PULSE_TRACING_ENABLED=true
  # and PULSE_OTLP_ENDPOINT=localhost:4317, then open Grafana at http://localhost:3000.
  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.154.0
    profiles: ["obs"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/collector/collector.dev.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC, the services export here
      - "4318:4318" # OTLP HTTP
    depends_on:
      - tempo

  # Prometheus stores the per-service /metrics scrape and receives Tempo's service-graph
  # metrics over remote-write (RFC-010 section 2). remote-write receive backs the
  # service graph; exemplar storage backs the metric->trace exemplar links (section 2.6).
  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["obs"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./observability/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
    # The service binaries run on the host; this lets Prometheus reach them.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.9.0
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.dev.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo query API (Grafana reads this)
    # Tempo's metrics-generator remote-writes the service graph to Prometheus.
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:13.1.0
    profiles: ["obs"]
    environment:
      # Dev only: anonymous admin, no login. Prod gates Grafana behind the ingress
      # access control (RFC-011 section 5), never anonymous.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus

volumes:
  tempo-data:
