  <link rel="icon" type="image/svg+xml" href="./assets/logo-dark.svg" media="(prefers-color-scheme: dark)">

    body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
    #redoc-host { flex: 1 1 auto; }
  </style>
</head>
<body>
  <pulse-header active="api" base="./"></pulse-header>

  <div class="masthead">
    <div class="wrap">
      <div>
        <p class="eyebrow">Built from api/openapi/v1.yaml</p>
        <h1 class="h1">API reference</h1>
      </div>
    </div>
  </div>

  <!--
    Redoc renders the reference in the browser from the local spec copy.
    docs-site/openapi.yaml is copied from api/openapi/v1.yaml by `make docs`,
    so this reference always matches the contract. The CDN script is the only
    external dependency and is used at view time only.
  -->
  <div id="redoc-host"></div>
  <pulse-footer base="./"></pulse-footer>
  <script src="https://cdn.redocly.com/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    // Theme Redoc to match the site's caramellatte palette so the menu and badges
    // are warm instead of Redoc's default blue.
    Redoc.init('./openapi.yaml', {
      theme: {
        colors: {
          primary: { main: '#8c4e2a' },
          http: {
            get: '#2f7d32',
            post: '#0e7490',
            put: '#b45309',
            patch: '#8c4e2a',
            delete: '#b3261e'
          }
        },
        sidebar: {
          backgroundColor: '#f7efe0',
          textColor: '#6b3d1c',
          activeTextColor: '#8c4e2a'
        },
        rightPanel: {
          backgroundColor: '#2a2018'
        },
        typography: {
          fontFamily: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
          headings: { fontFamily: 'inherit' }
        }
      }
    }, document.getElementById('redoc-host'));
  </script>
  <!-- Simple Analytics (cookieless; collect-dnt=true counts Do-Not-Track visitors too) -->
  <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif?collect-dnt=true" alt="" referrerpolicy="no-referrer-when-downgrade"/></noscript>
</body>
</html>
