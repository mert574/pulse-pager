# Provisioned Alertmanager datasource (RFC-010 section 7/8) so Grafana's Alerting view
# shows the alerts Prometheus is firing and Alertmanager is routing.
apiVersion: 1
datasources:
  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false
