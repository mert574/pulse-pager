# Minimal single-binary Loki for local dev (RFC-010 section 3): receives logs over its
# native OTLP endpoint (/otlp/v1/logs, on by default in Loki 3), stores on the local
# filesystem. Prod uses an object-store backend at scale (RFC-010 open question 1).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # OTLP ingestion writes the resource/scope/log attributes as structured metadata.
  allow_structured_metadata: true
  volume_enabled: true

# Single-node: no compactor/ruler tuning needed for dev.
