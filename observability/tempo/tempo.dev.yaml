# Minimal single-binary Tempo for local dev: OTLP ingest from the collector, traces
# on the local filesystem. Prod uses an object-store backend at scale (RFC-010 section 4,
# storage/retention is open question 1).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Metrics-generator with two processors: local-blocks so TraceQL metrics queries
# (rate(), quantile_over_time()) work inside Tempo, and service-graphs so Grafana's
# Service Graph has data. The service-graph metrics are remote-written to Prometheus
# (RFC-010 section 4); local-blocks stays internal to Tempo.
metrics_generator:
  processor:
    local_blocks:
      flush_to_storage: true
    service_graphs: {}
  storage:
    path: /var/tempo/generator/wal
    # Send the generated service-graph series (and their exemplars) to Prometheus.
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  registry:
    external_labels:
      source: tempo

# Turn both generator processors on for the default tenant.
overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks, service-graphs]
