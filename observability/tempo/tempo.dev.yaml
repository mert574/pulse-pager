# Minimal single-binary Tempo for local dev: OTLP ingest from the collector, traces
# on the local filesystem. Prod uses an object-store backend at scale (RFC-010 section 4,
# storage/retention is open question 1).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Metrics-generator with the local-blocks processor so TraceQL metrics queries
# (rate(), count_over_time(), quantile_over_time()) work. These are computed inside
# Tempo, no Prometheus needed.
metrics_generator:
  processor:
    local_blocks:
      flush_to_storage: true
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces

# Turn the generator's local-blocks processor on for the default tenant.
overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks]
