<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Operator admin entry. A separate app on its own origin (admin.pulsepager.com),
      never imported by the customer SPA, so a customer-app XSS cannot reach an admin
      session (cookies are host-only). Authorization is server-side: in production the
      origin sits behind Cloudflare Access and the api authorizes against the
      PULSE_PLATFORM_ADMINS allowlist. noindex: this is not a public page.
    -->
    <title>Pulse Pager — Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="logo.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="logo-dark.svg" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("pulse.theme");
          if (t !== "caramellatte" && t !== "coffee") {
            t = "caramellatte"; // default to the light theme, not the OS preference
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <admin-shell></admin-shell>
    <script type="module" src="/src/admin/admin-main.ts"></script>
  </body>
</html>
